---
# IMPORTANT : on autorise SSH AVANT d'activer le firewall (anti-lockout).
- name: Autoriser SSH en premier
  community.general.ufw:
    rule: allow
    port: '22222'
    proto: tcp

- name: Politique par défaut — deny en entrée, allow en sortie
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }

- name: Autoriser les ports publics (HTTP/HTTPS)
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_allowed_tcp }}"

- name: Activer ufw avec logging
  community.general.ufw:
    state: enabled
    logging: "on"
